# Allow build scripts for these dependencies so `pnpm install` runs their
# postinstall steps (e.g. sharp's native binaries) without an interactive
# approval prompt. pnpm 10 reads this from pnpm-workspace.yaml.
allowBuilds:
  "@firebase/util": true
  "@google/genai": true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
